name: Build and Release

# v로 시작하는 태그(예: v1.4)를 push하면 자동으로 exe를 빌드하고 릴리스합니다.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # 수동 실행도 가능

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build OptiBoost.exe
        shell: pwsh
        run: >
          pyinstaller --onefile --noconsole --uac-admin
          --runtime-tmpdir "%LOCALAPPDATA%\OptiBoost\runtime"
          --icon icon.ico --add-data "icon.ico;."
          --name OptiBoost PCOptimizer.pyw

      - name: Package installer zip
        shell: pwsh
        run: |
          $pkg = "OptiBoost_dist"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          Copy-Item dist\OptiBoost.exe "$pkg\OptiBoost.exe"
          foreach ($f in 'install.ps1','uninstall.ps1','icon.ico','설치.bat','제거.bat','사용법.txt','먼저읽어주세요.txt') {
            if (Test-Path $f) { Copy-Item $f $pkg }
          }
          Compress-Archive -Path "$pkg\*" -DestinationPath OptiBoost.zip -Force

      - name: Build setup wizard (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" OptiBoost.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/OptiBoost.exe
            dist/OptiBoost_Setup.exe
            OptiBoost.zip
          generate_release_notes: true
